<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Blog</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>My Blog</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="publicaciones.html">PUBLICACIONES</a>
            <a href="redes.html">REDES</a>
            <a href="conocenos.html">CONOCENOS</a>
            <a href="/crear-blog">CREAR BLOG</a>
        </nav>
    </header>
    <main>
        <section id="banner" style="background: #EDE7F6; border-radius: 12px; padding: 2rem; text-align: center; margin-bottom: 1.5rem;">
            <h2 style="margin: 0; color: #4A148C;">Bienvenido a My Blog</h2>
            <p style="color: #6A1B9A;">Encuentra las últimas publicaciones y comparte tu historia.</p>
        </section>

        <section id="carousel-section" style="margin-bottom: 2rem;">
            <h2>Últimas 3 entradas</h2>
            <div id="post-carousel" style="display: flex; overflow-x: auto; gap: 1rem; padding: 1rem 0;">
                <!-- Carousel items -->
            </div>
        </section>

        <section id="posts">
            <h2>Latest Posts</h2>
            <div id="latest-posts" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; margin-top: 2rem;">
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 My Blog</p>
    </footer>
    <script>
        fetch('/api/posts')
        .then(response => response.json())
        .then(data => {
            const latest = data.posts.slice(0, 6);
            const carousel = document.getElementById('post-carousel');
            const list = document.getElementById('latest-posts');

            data.posts.slice(0, 3).forEach(post => {
                const item = document.createElement('div');
                item.style.cssText = 'min-width: 300px; border: 1px solid #E1BEE7; border-radius: 10px; overflow: hidden; background: #FFF; box-shadow: 0 2px 8px rgba(0,0,0,0.08);';

                const cover = post.cover ? `<img src="${post.cover}" alt="${post.title}" style="width:100%; height:180px; object-fit: cover;">` : '';
                item.innerHTML = `
                    ${cover}
                    <div style="padding: 0.8rem;">
                        <h3 style="margin: 0 0 0.5rem; color: #6A1B9A;">${post.title}</h3>
                        <a href="posts/${post.slug}.html" style="color: #6A1B9A; text-decoration:none; font-weight: bold;">Ver publicación</a>
                    </div>
                `;
                carousel.appendChild(item);
            });

            latest.forEach(post => {
                const card = document.createElement('div');
                card.className = 'post-card';
                card.innerHTML = `
                    ${post.cover ? `<img src="${post.cover}" alt="${post.title}">` : ''}
                    <div class="post-card-content">
                        <h3>${post.title}</h3>
                        <a href="posts/${post.slug}.html">Leer más →</a>
                    </div>
                `;
                list.appendChild(card);
            });
        });
    </script>
    <script src="js/script.js"></script>
</body>
</html>
