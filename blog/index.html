<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Blog</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>My Blog</h1>
        <nav>
            <a href="publicaciones.html">PUBLICACIONES</a>
            <a href="redes.html">REDES</a>
            <a href="conocenos.html">CONOCENOS</a>
            <a href="/crear-blog">Crear Blog</a>
        </nav>
    </header>
    <main>
        <section id="posts">
            <h2>Latest Posts</h2>
            <div id="latest-posts" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; margin-top: 2rem;">
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 My Blog</p>
    </footer>
    <script>
        fetch('/api/posts')
        .then(response => response.json())
        .then(data => {
            const list = document.getElementById('latest-posts');
            data.posts.slice(0, 6).forEach(post => {
                const card = document.createElement('div');
                card.style.cssText = 'border: 1px solid #E1BEE7; border-radius: 8px; overflow: hidden; background: #F3E5F5; transition: transform 0.3s;';
                card.onmouseover = () => card.style.transform = 'scale(1.05)';
                card.onmouseout = () => card.style.transform = 'scale(1)';
                
                let coverImage = '';
                if (post.cover) {
                    coverImage = `<img src="${post.cover}" alt="${post.title}" style="width: 100%; height: 200px; object-fit: cover;">`;
                }
                
                card.innerHTML = `
                    ${coverImage}
                    <div style="padding: 1rem;">
                        <h3 style="margin: 0.5rem 0; color: #6A1B9A;">${post.title}</h3>
                        <a href="posts/${post.slug}.html" style="color: #6A1B9A; text-decoration: none; font-weight: bold;">Leer más →</a>
                    </div>
                `;
                list.appendChild(card);
            });
        });
    </script>
    <script src="js/script.js"></script>
</body>
</html>
